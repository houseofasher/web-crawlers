# Trusted whitelist — the only gate for what Aureon may learn from via OmniSpider.
# Keys match Aureon taxonomy slugs (domain, subdomain, or micro-subdomain).
# Bridge resolves dotted paths (e.g. humanities.history.ancient_history) to the nearest key.

