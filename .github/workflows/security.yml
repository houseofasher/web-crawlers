name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests (incl. security)
        run: npm test

      - name: SSRF guard smoke test
        run: node --input-type=module -e "import { SSRFGuard } from './dist/security/nomad.js'; const g = new SSRFGuard({}); if (g.validateUrl('http://127.0.0.1/admin').ok) process.exit(1);"
